name: Limpar Conteudo Expirado

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python cleanup_content.py
      - run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto: removido conteudo expirado"
          git push
