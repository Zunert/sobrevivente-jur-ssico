name: Atualizar Noticias The Isle

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8,20 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install feedparser requests
      - run: python update_news.py
      - run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto: noticias atualizadas"
          git push
